<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>A-Frame Practical Quiz Demo</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body>
  <a-scene>
    <a-assets>
      <img id="sky-tex" src="Assets/sky.jpg">
      <img id="milo-tex" src="Assets/milo_.jpg">
      <img id="milk-tex" src="Assets/milk.jpg">
    </a-assets>

    <a-sky src="#sky-tex"></a-sky>

    <!-- Ground -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#2c5e1d"></a-plane>

    <!-- Curved Walls -->
    <!-- A single continuous wall wrapping around the back, leaving an opening at the front where the path is -->
    <a-cylinder radius="20" height="10" position="0 5 0" open-ended="true" side="double" color="#f2ebd9"
      theta-length="280" rotation="0 40 0"></a-cylinder>

    <!-- Path -->
    <a-box position="0 0.05 4" width="1.5" depth="0.8" height="0.1" color="#d4c9b8"></a-box>
    <a-box position="0 0.05 5.2" width="1.5" depth="0.8" height="0.1" color="#b8ab9a"></a-box>
    <a-box position="0 0.05 6.4" width="1.5" depth="0.8" height="0.1" color="#d4c9b8"></a-box>
    <a-box position="0 0.05 7.6" width="1.5" depth="0.8" height="0.1" color="#b8ab9a"></a-box>
    <a-box position="0 0.05 8.8" width="1.5" depth="0.8" height="0.1" color="#d4c9b8"></a-box>
    <a-box position="0 0.05 10" width="1.5" depth="0.8" height="0.1" color="#b8ab9a"></a-box>
    <a-box position="0 0.05 11.2" width="1.5" depth="0.8" height="0.1" color="#d4c9b8"></a-box>
    <a-box position="0 0.05 12.4" width="1.5" depth="0.8" height="0.1" color="#b8ab9a"></a-box>
    <a-box position="0 0.05 13.6" width="1.5" depth="0.8" height="0.1" color="#d4c9b8"></a-box>
    <a-box position="0 0.05 14.8" width="1.5" depth="0.8" height="0.1" color="#b8ab9a"></a-box>

    <!-- Gazebo -->
    <a-entity id="gazebo" position="0 0 0">
      <!-- Floor layers -->
      <a-cylinder position="0 0.1 0" radius="4" height="0.2" color="#666666"></a-cylinder>
      <a-cylinder position="0 0.25 0" radius="3.5" height="0.1" color="#8c775a"></a-cylinder>
      <a-cylinder position="0 0.35 0" radius="3.5" height="0.1" color="#ebdcc8"></a-cylinder>

      <!-- Railing -->
      <a-cylinder position="0 0.9 0" radius="3.3" height="1.0" open-ended="true" side="double" color="#ebdcc8"
        theta-start="30" theta-length="300"></a-cylinder>

      <!-- Pillars -->
      <a-entity rotation="0 0 0"><a-cylinder position="0 1.9 3.3" radius="0.08" height="3"
          color="#f2ebd9"></a-cylinder></a-entity>
      <a-entity rotation="0 45 0"><a-cylinder position="0 1.9 3.3" radius="0.08" height="3"
          color="#f2ebd9"></a-cylinder></a-entity>
      <a-entity rotation="0 90 0"><a-cylinder position="0 1.9 3.3" radius="0.08" height="3"
          color="#f2ebd9"></a-cylinder></a-entity>
      <a-entity rotation="0 135 0"><a-cylinder position="0 1.9 3.3" radius="0.08" height="3"
          color="#f2ebd9"></a-cylinder></a-entity>
      <a-entity rotation="0 180 0"><a-cylinder position="0 1.9 3.3" radius="0.08" height="3"
          color="#f2ebd9"></a-cylinder></a-entity>
      <a-entity rotation="0 225 0"><a-cylinder position="0 1.9 3.3" radius="0.08" height="3"
          color="#f2ebd9"></a-cylinder></a-entity>
      <a-entity rotation="0 270 0"><a-cylinder position="0 1.9 3.3" radius="0.08" height="3"
          color="#f2ebd9"></a-cylinder></a-entity>
      <a-entity rotation="0 315 0"><a-cylinder position="0 1.9 3.3" radius="0.08" height="3"
          color="#f2ebd9"></a-cylinder></a-entity>

      <!-- Top Ring and Roof -->
      <a-cylinder position="0 3.4 0" radius="3.4" height="0.4" open-ended="true" side="double"
        color="#ebdcc8"></a-cylinder>
      <a-cone position="0 4.3 0" radius-bottom="3.7" radius-top="0.1" height="1.8" color="#d17f54"></a-cone>

      <!-- Gazebo Interior Light -->
      <a-light type="point" color="#ffebb0" intensity="0.8" position="0 2.8 0" distance="10" decay="2"></a-light>

      <!-- Moving Ceiling Fan -->
      <a-entity id="ceiling-fan" position="0 3.3 0">
        <!-- Fan Base/Rod -->
        <a-cylinder radius="0.05" height="0.4" color="#333333"></a-cylinder>
        <a-sphere position="0 -0.2 0" radius="0.12" color="#444444"></a-sphere>

        <!-- Rotating Blades -->
        <a-entity position="0 -0.2 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 800; easing: linear">
          <!-- Blade 1 -->
          <a-box position="0.6 0 0" width="1.0" height="0.02" depth="0.2" color="#664128" rotation="10 0 0"></a-box>
          <!-- Blade 2 -->
          <a-box position="-0.3 0 0.52" width="1.0" height="0.02" depth="0.2" color="#664128"
            rotation="10 120 0"></a-box>
          <!-- Blade 3 -->
          <a-box position="-0.3 0 -0.52" width="1.0" height="0.02" depth="0.2" color="#664128"
            rotation="10 240 0"></a-box>
        </a-entity>
      </a-entity>
    </a-entity>

    <!-- Table and Chairs -->
    <a-entity id="furniture" position="0 0 0">
      <!-- Table -->
      <a-cylinder position="0 0.9 0" radius="0.1" height="1.0" color="#1c1613"></a-cylinder>
      <a-cylinder position="0 1.4 0" radius="1.3" height="0.05" color="#3d2c25"></a-cylinder>

      <!-- Chair 1 -->
      <a-entity id="chair1" position="-1.7 0.4 0" rotation="0 90 0">
        <a-box position="0 0.5 0" width="0.7" height="0.05" depth="0.7" color="#3d2c25"></a-box>
        <a-cylinder position="-0.3 0.25 -0.3" radius="0.03" height="0.5" color="#1c1613"></a-cylinder>
        <a-cylinder position="0.3 0.25 -0.3" radius="0.03" height="0.5" color="#1c1613"></a-cylinder>
        <a-cylinder position="-0.3 0.25 0.3" radius="0.03" height="0.5" color="#1c1613"></a-cylinder>
        <a-cylinder position="0.3 0.25 0.3" radius="0.03" height="0.5" color="#1c1613"></a-cylinder>
        <a-box position="0 0.9 -0.3" width="0.7" height="0.8" depth="0.05" color="#3d2c25"></a-box>
      </a-entity>

      <!-- Chair 2 -->
      <a-entity id="chair2" position="1.7 0.4 0" rotation="0 -90 0">
        <a-box position="0 0.5 0" width="0.7" height="0.05" depth="0.7" color="#3d2c25"></a-box>
        <a-cylinder position="-0.3 0.25 -0.3" radius="0.03" height="0.5" color="#1c1613"></a-cylinder>
        <a-cylinder position="0.3 0.25 -0.3" radius="0.03" height="0.5" color="#1c1613"></a-cylinder>
        <a-cylinder position="-0.3 0.25 0.3" radius="0.03" height="0.5" color="#1c1613"></a-cylinder>
        <a-cylinder position="0.3 0.25 0.3" radius="0.03" height="0.5" color="#1c1613"></a-cylinder>
        <a-box position="0 0.9 -0.3" width="0.7" height="0.8" depth="0.05" color="#3d2c25"></a-box>
      </a-entity>

      <!-- Items on Table (Table top is at y=1.425) -->
      <!-- Milo Tin -->
      <a-entity position="-0.4 1.575 -0.3">
        <a-cylinder src="#milo-tex" radius="0.15" height="0.3" open-ended="true" rotation="0 -90 0"></a-cylinder>
        <!-- Metal Caps -->
        <a-cylinder radius="0.148" height="0.005" position="0 0.15 0" color="#b0b5b9"></a-cylinder>
        <a-cylinder radius="0.15" height="0.01" position="0 -0.15 0" color="#b0b5b9"></a-cylinder>
      </a-entity>

      <!-- Milk Tin -->
      <a-entity position="0.3 1.525 0.2">
        <a-cylinder src="#milk-tex" radius="0.1" height="0.2" open-ended="true" rotation="0 180 0"></a-cylinder>
        <!-- Metal Caps -->
        <a-cylinder radius="0.098" height="0.005" position="0 0.1 0" color="#b0b5b9"></a-cylinder>
        <a-cylinder radius="0.1" height="0.01" position="0 -0.1 0" color="#b0b5b9"></a-cylinder>
      </a-entity>

      <!-- 2 Cups -->
      <a-cylinder position="-0.2 1.5 0.4" radius="0.06" height="0.15" color="#e3a72f"></a-cylinder>
      <a-cylinder position="0.4 1.5 -0.3" radius="0.06" height="0.15" color="#d9d9d9"></a-cylinder>
    </a-entity>

    <!-- Camera and Lighting -->
    <a-entity position="0 0 20">
      <a-camera></a-camera>
    </a-entity>

    <a-light type="ambient" color="#FFF" intensity="0.3"></a-light>
    <a-light type="directional" color="#FFF" intensity="0.4" position="-0.5 1 1"></a-light>

  </a-scene>
</body>

</html>
